<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>HRV - Asbestos Awareness</title>
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Fonts -->
    <link
      href="https://fonts.googleapis.com/css?family=Poppins:300,400,600,700&display=swap"
      rel="stylesheet"
    />

    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://use.fontawesome.com/releases/v5.8.1/css/all.css"
    />
  </head>

  <body>
    <div id="root"></div>
    <div id="modal-container" role="dialog" aria-live="assertive"></div>
    <div id="image-zoom-container" role="dialog"></div>

    <!-- IE compatibility block -->
    <script>
      if (
        /MSIE 7.0|MSIE 8.0|MSIE 9.0|MSIE 10.0/g.test(
          window.navigator.userAgent
        )
      ) {
        var messageBody =
          "<span style='font-size:18px;'>It looks like you have compatibility mode enabled. Please use Chrome or Firefox.</span>";
        var contactUs =
          "<span style='font-size:14px;'><a href='mailto:support@chameleonrowserIncompatible.png";

        document.body.innerHTML =
          '<div style="padding:50px;text-align:center;">' +
          '<img src="' + img + '" style="width:760px;max-width:100%;" />' +
          '<h1>Whoops!</h1><p>' +
          messageBody +
          '</p><p>' +
          contactUs +
          "</p></div>";
      }
    </script>

    <!-- SCORM config -->
    <script>
      window.scormVersion = "1.2";
      window.mode = "PREVIEW";
      window.source = "scorm";
      window.env = "production";
    </script>

    <!-- App scripts -->
    <script src="./vendor.js"></script>
    <script src="./module.js"></script>
  </body>
</html>
